services:
  postgres:
    image: postgres:16-alpine
    container_name: master_gateway_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: master_gateway
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d master_gateway"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - master_gateway_pg_data:/var/lib/postgresql/data

volumes:
  master_gateway_pg_data:
